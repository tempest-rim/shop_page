<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="stylesheet" href="style.css">
    <!-- Iconos externos para un look más profesional (FontAwesome) -->

<body class="inicio-body">

    <div class="split-container">
        
        <!-- LADO RIMURU STORE -->
        <a href="anime.html" class="split-side left">

        <!-- LADO 70CORTES7 -->
